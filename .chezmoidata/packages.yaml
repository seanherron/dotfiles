packages:
  brews:
  # Core
  - 'git'
  - 'zsh'
  - 'antidote'
  - 'starship'
  # Modern CLI replacements
  - 'fzf'
  - 'zoxide'
  - 'eza'
  - 'bat'
  - 'fd'
  - 'ripgrep'
  - 'dust'      # better `du`
  - 'procs'     # better `ps`
  - 'sd'        # better `sed`
  # Git
  - 'git-delta' # syntax-highlighted diffs, wired into ~/.gitconfig
  - 'gh'        # GitHub CLI
  - 'lazygit'   # TUI for git
  # Shell quality of life
  - 'atuin'     # searchable shell history (Ctrl+R)
  - 'mise'      # universal language/tool version manager
  - 'direnv'    # per-directory env vars
  - 'tealdeer'  # `tldr` — practical man-page examples
  - 'hyperfine' # command-line benchmarking
  # System
  - 'btop'      # prettier `htop`
  - 'zellij'    # terminal multiplexer (portable; for SSH/server use where cmux isn't available)
  # macOS-only brews. Installed on darwin only (see run_onchange_install-packages.sh.tmpl).
  darwinBrews:
  - 'mas'       # Mac App Store CLI (consumed by `mas` section below)
  # GNU tools on macOS (PATH set in dot_zprofile to make them unprefixed).
  # Linux already ships GNU coreutils/sed, so these are darwin-only.
  - 'coreutils'
  - 'gnu-sed'
  # Work-profile macOS brews. Installed only when profile == "work" (see
  # run_onchange_install-packages.sh.tmpl). Currently only wired into the darwin branch.
  # Both feed /etc/pam.d/sudo_local (see run_onchange_setup-sudo-auth.sh.tmpl).
  workBrews:
  - 'pam-u2f'      # security-key (FIDO2/U2F) auth for sudo
  - 'pam-reattach' # lets Touch ID for sudo work inside tmux/zellij/cmux
  casks:
  - '1password-cli'  # CLI binary (op) — no root app, no sudo
  - 'claude-code'    # CLI binary
  - 'codex'          # CLI binary
  - 'cmux'           # app, installs user-owned
  - 'ghostty'        # app, installs user-owned
  # Personal-profile casks: installed only when profile == "personal" (see
  # run_onchange_install-packages.sh.tmpl). These are GUI apps that on a work
  # machine come from IT/MDM (they land root-owned in /Applications) and all
  # self-update, so letting brew bundle manage them just causes upgrade churn —
  # and every upgrade of a root-owned app needs sudo, which is what made
  # `chezmoi apply` prompt for a password repeatedly. Gating them to personal
  # keeps brew authoritative at home while leaving MDM's copies untouched at work.
  personalCasks:
  - '1password'
  - 'google-chrome'
  - 'visual-studio-code'
  - 'cursor'
  - 'claude'          # Claude.app (desktop); the claude-code CLI stays cross-profile above
  - 'chatgpt'
  - 'codex-app'       # Codex.app (desktop); the codex CLI stays cross-profile above
  # Mac App Store apps. Format: '<id>:<App Name>' — find an id with `mas search <name>`.
  # Empty by default; add entries like '497799835:Xcode'.
  mas: []
