"$schema" = "https://starship.rs/config-schema.json"

# Two-line prompt: context on top, input on bottom
format = """
$directory$git_branch$git_status$nodejs$python$rust$golang$docker_context$cmd_duration
$character"""

add_newline = true
palette = "catppuccin_mocha"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[directory]
style = "bold sapphire"
truncation_length = 3
truncate_to_repo = true
read_only = "  "

[git_branch]
symbol = " "
style = "bold mauve"

[git_status]
style = "bold red"
format = "([\\[$all_status$ahead_behind\\]]($style) )"

[cmd_duration]
min_time = 2000
format = "took [$duration]($style) "
style = "bold yellow"

[nodejs]
format = "via [$symbol($version )]($style)"
style = "bold green"

[python]
format = "via [$symbol($version )]($style)"
style = "bold yellow"

[rust]
format = "via [$symbol($version )]($style)"
style = "bold peach"

[golang]
format = "via [$symbol($version )]($style)"
style = "bold sky"

[docker_context]
format = "via [$symbol$context]($style) "
style = "bold blue"

[package]
disabled = true

[aws]
disabled = true

[gcloud]
disabled = true

[azure]
disabled = true

# Catppuccin Mocha palette — https://github.com/catppuccin/starship
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
