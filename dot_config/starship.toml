"$schema" = "https://starship.rs/config-schema.json"

# Two-line prompt: context on top, input on bottom
format = """
$directory$git_branch$git_status$nodejs$python$rust$golang$docker_context$cmd_duration
$character"""

add_newline = true
palette = "nord"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[directory]
style = "bold nord8"
truncation_length = 3
truncate_to_repo = true
read_only = " [ro]"

[git_branch]
symbol = ""
style = "bold nord15"

[git_status]
style = "bold nord11"
format = "([\\[$all_status$ahead_behind\\]]($style) )"

[cmd_duration]
min_time = 2000
format = "took [$duration]($style) "
style = "bold nord13"

[nodejs]
format = "via [$symbol($version )]($style)"
style = "bold nord14"

[python]
format = "via [$symbol($version )]($style)"
style = "bold nord13"

[rust]
format = "via [$symbol($version )]($style)"
style = "bold nord12"

[golang]
format = "via [$symbol($version )]($style)"
style = "bold nord7"

[docker_context]
format = "via [$symbol$context]($style) "
style = "bold nord10"

[package]
disabled = true

[aws]
disabled = true

[gcloud]
disabled = true

[azure]
disabled = true

# Nord palette — https://www.nordtheme.com
[palettes.nord]
# Polar Night (backgrounds, dark UI)
nord0 = "#2E3440"
nord1 = "#3B4252"
nord2 = "#434C5E"
nord3 = "#4C566A"
# Snow Storm (foreground, light text)
nord4 = "#D8DEE9"
nord5 = "#E5E9F0"
nord6 = "#ECEFF4"
# Frost (blue/teal accent tones)
nord7 = "#8FBCBB"
nord8 = "#88C0D0"
nord9 = "#81A1C1"
nord10 = "#5E81AC"
# Aurora (colorful accents)
nord11 = "#BF616A"
nord12 = "#D08770"
nord13 = "#EBCB8B"
nord14 = "#A3BE8C"
nord15 = "#B48EAD"
