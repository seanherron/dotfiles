# lazygit config — Nord
#
# On macOS, lazygit defaults to ~/Library/Application Support/lazygit/config.yml.
# dot_zprofile exports XDG_CONFIG_HOME=$HOME/.config, which makes lazygit read
# this file instead. If you launch lazygit from a context that doesn't inherit
# that env var, set `LG_CONFIG_FILE=~/.config/lazygit/config.yml` explicitly.

gui:
  theme:
    activeBorderColor:
      - "#88C0D0"  # frost/nord8
      - bold
    inactiveBorderColor:
      - "#4C566A"  # polar night/nord3
    optionsTextColor:
      - "#81A1C1"  # frost/nord9
    selectedLineBgColor:
      - "#3B4252"  # polar night/nord1
    cherryPickedCommitBgColor:
      - "#434C5E"  # polar night/nord2
    cherryPickedCommitFgColor:
      - "#88C0D0"  # frost/nord8
    unstagedChangesColor:
      - "#BF616A"  # aurora red/nord11
    defaultFgColor:
      - "#D8DEE9"  # snow storm/nord4
    searchingActiveBorderColor:
      - "#EBCB8B"  # aurora yellow/nord13
  authorColors:
    "*": "#B48EAD"  # aurora purple/nord15

git:
  paging:
    colorArg: always
    pager: delta --paging=never
  commit:
    signOff: false
  log:
    order: topo-order
    showGraph: always
    showWholeGraph: true
