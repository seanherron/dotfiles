# tealdeer (`tldr`) — practical man-page examples.

[display]
compact = false
use_pager = false

[updates]
# Refresh the local pages cache once a week.
auto_update = true
auto_update_interval_hours = 168

# --- Style (Nord palette via RGB) ---

[style.description]
# snow storm / nord4 #D8DEE9
foreground = { rgb = { r = 216, g = 222, b = 233 } }

[style.command_name]
# aurora purple / nord15 #B48EAD
foreground = { rgb = { r = 180, g = 142, b = 173 } }
bold = true

[style.example_text]
# aurora green / nord14 #A3BE8C
foreground = { rgb = { r = 163, g = 190, b = 140 } }

[style.example_code]
# frost / nord8 #88C0D0
foreground = { rgb = { r = 136, g = 192, b = 208 } }

[style.example_variable]
# aurora orange / nord12 #D08770
foreground = { rgb = { r = 208, g = 135, b = 112 } }
italic = true
