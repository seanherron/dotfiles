# btop config — only the keys we want to override. btop will rewrite this file
# on exit to fill in defaults; chezmoi will revert any in-place edits on the
# next `chezmoi apply`. If you want a setting to stick, add it here.

color_theme = "nord"
theme_background = False
truecolor = True
vim_keys = True
rounded_corners = True
update_ms = 1500
proc_sorting = "cpu lazy"
proc_tree = False
