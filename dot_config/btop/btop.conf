# btop config — only the keys we want to override. btop will rewrite this file
# on exit to fill in defaults; chezmoi will revert any in-place edits on the
# next `chezmoi apply`. If you want a setting to stick, add it here.
#
# Catppuccin theme files ship with recent btop builds at
# $(brew --prefix)/share/btop/themes/catppuccin_mocha.theme — if your build
# doesn't include them, grab the file from https://github.com/catppuccin/btop
# and drop it under ~/.config/btop/themes/.

color_theme = "catppuccin_mocha"
theme_background = False
truecolor = True
vim_keys = True
rounded_corners = True
update_ms = 1500
proc_sorting = "cpu lazy"
proc_tree = False
